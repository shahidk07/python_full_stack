<!DOCTYPE html>
<html>
<body style="
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
">

<div style="
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
">

    <h1 style="color:#2563eb;">
        Password Reset
    </h1>

    <p>Hello,</p>

    <p>
        We received a request to reset your password.
    </p>

    <div style="
        background:#eff6ff;
        border:2px dashed #2563eb;
        text-align:center;
        padding:20px;
        margin:30px 0;
        border-radius:10px;
    ">
        <span style="
            font-size:42px;
            font-weight:bold;
            letter-spacing:8px;
            color:#2563eb;
        ">
            {{otp}}
        </span>
    </div>

    <p>
        This code expires in <b>5 minutes</b>.
    </p>

    <p>
        If you didn't request a password reset, ignore this email.
    </p>

    <hr>

    <p style="color:gray;">
        Shahid Store Security Team
    </p>

</div>

</body>
</html>
